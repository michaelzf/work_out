# Tmux 配置文件

# ===== 基础设置 =====
# 前缀键改为 Ctrl+A
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# 终端设置
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# 启用鼠标
set -g mouse on

# 历史记录
set -g history-limit 50000

# 减少延迟
set -sg escape-time 0

# 窗口索引从 1 开始
set -g base-index 1
setw -g pane-base-index 1

# 自动重新编号窗口
set -g renumber-windows on

# ===== 快捷键 =====
# 分割窗格 (vim 风格)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# 窗格导航 (vim 风格)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 调整窗格大小
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 快速切换窗口
bind -n M-, previous-window
bind -n M-. next-window

# Alt+数字 切换窗口
bind -n M-` select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# 重新加载配置
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# 新建窗口保持当前路径
bind c new-window -c "#{pane_current_path}"

# vi 模式
setw -g mode-keys vi

# 复制模式
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ===== 状态栏 =====
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# 状态栏颜色
set -g status-style "bg=#1a1b26,fg=#a9b1d6"

# 左侧状态栏
set -g status-left-length 40
set -g status-left "#[fg=#7aa2f7,bold] #S #[fg=#565f89]│ "

# 右侧状态栏
set -g status-right-length 60
set -g status-right "#[fg=#565f89]│ #[fg=#9ece6a]%Y-%m-%d #[fg=#565f89]│ #[fg=#bb9af7]%H:%M "

# 窗口状态
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
setw -g window-status-separator ""

# 窗格边框
set -g pane-border-style "fg=#565f89"
set -g pane-active-border-style "fg=#7aa2f7"

# 消息样式
set -g message-style "bg=#1a1b26,fg=#7aa2f7"

# ===== TPM 插件管理 =====
# 插件列表
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# tmux-resurrect 配置
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum 配置
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# 初始化 TPM (保持在配置文件最后)
run '~/.tmux/plugins/tpm/tpm'
